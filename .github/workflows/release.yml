name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # create the release + upload assets
  id-token: write       # OIDC token for Sigstore keyless signing

env:
  GO_VERSION_FILE: go.mod

jobs:
  # Cross-compile one binary per platform. Go cross-compiles on a single
  # linux runner since the build is pure Go (CGO_ENABLED=0 in the Makefile).
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: go.sum

      - name: Determine binary and asset names
        id: names
        run: |
          BIN="viti"
          BIN_GUI="viti-gui"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN="viti.exe"
            BIN_GUI="viti-gui.exe"
          fi
          ASSET="viti-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          ASSET_GUI="viti-gui-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          {
            echo "bin=$BIN"
            echo "bin_gui=$BIN_GUI"
            echo "asset=$ASSET"
            echo "asset_gui=$ASSET_GUI"
          } >> "$GITHUB_OUTPUT"

      - name: Build viti
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: make build BINARY=${{ steps.names.outputs.bin }}

      - name: Build viti-gui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: make build-gui BINARY_GUI=${{ steps.names.outputs.bin_gui }}

      - name: Stage archive contents
        run: |
          mkdir -p dist/${{ steps.names.outputs.asset }}
          cp bin/${{ steps.names.outputs.bin }} dist/${{ steps.names.outputs.asset }}/
          cp README.md LICENSE dist/${{ steps.names.outputs.asset }}/

          mkdir -p dist/${{ steps.names.outputs.asset_gui }}
          cp bin/${{ steps.names.outputs.bin_gui }} dist/${{ steps.names.outputs.asset_gui }}/
          cp README.md LICENSE dist/${{ steps.names.outputs.asset_gui }}/

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        working-directory: dist
        run: |
          tar -czf ${{ steps.names.outputs.asset }}.tar.gz ${{ steps.names.outputs.asset }}
          tar -czf ${{ steps.names.outputs.asset_gui }}.tar.gz ${{ steps.names.outputs.asset_gui }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        working-directory: dist
        run: |
          zip -r ${{ steps.names.outputs.asset }}.zip ${{ steps.names.outputs.asset }}
          zip -r ${{ steps.names.outputs.asset_gui }}.zip ${{ steps.names.outputs.asset_gui }}

      - name: Compute SHA-256 checksum
        working-directory: dist
        run: |
          sha256sum ${{ steps.names.outputs.asset }}.${{ matrix.archive }}     > ${{ steps.names.outputs.asset }}.${{ matrix.archive }}.sha256
          sha256sum ${{ steps.names.outputs.asset_gui }}.${{ matrix.archive }} > ${{ steps.names.outputs.asset_gui }}.${{ matrix.archive }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ steps.names.outputs.asset }}.${{ matrix.archive }}
            dist/${{ steps.names.outputs.asset }}.${{ matrix.archive }}.sha256
            dist/${{ steps.names.outputs.asset_gui }}.${{ matrix.archive }}
            dist/${{ steps.names.outputs.asset_gui }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 1

  # Generate source code SBOM in parallel with the binary builds.
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: go.sum

      - name: Generate source SBOM
        run: make sbom SBOM_OUTPUT_DIR=.

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-source
          path: |
            sbom-source.cdx.json
            sbom-source.spdx.json
          retention-days: 90

  # Sign each archive with Sigstore keyless and create the GitHub Release.
  release:
    name: Publish Release
    needs: [build-binaries, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Download source SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom-source
          path: dist

      - name: Create aggregated checksum file
        working-directory: dist
        run: |
          sha256sum *.tar.gz *.zip 2>/dev/null > viti-${GITHUB_REF_NAME}-SHA256SUMS
          rm -f *.sha256  # individual per-asset checksum files; aggregate replaces them

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign archives (Sigstore keyless)
        working-directory: dist
        env:
          COSIGN_YES: "true"
        run: |
          for f in *.tar.gz *.zip; do
            [ -f "$f" ] || continue
            cosign sign-blob --bundle "${f}.cosign.bundle" "$f"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, uploading assets..."
            gh release upload "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              *.tar.gz *.zip *.cosign.bundle \
              viti-${{ github.ref_name }}-SHA256SUMS \
              sbom-source.cdx.json sbom-source.spdx.json
          else
            echo "Creating release ${{ github.ref_name }}..."
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --generate-notes \
              --latest \
              *.tar.gz *.zip *.cosign.bundle \
              viti-${{ github.ref_name }}-SHA256SUMS \
              sbom-source.cdx.json sbom-source.spdx.json
          fi
