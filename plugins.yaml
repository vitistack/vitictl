# plugins.yaml — curated index of viti-installable plugins.
#
# vitictl fetches this file at runtime (from raw.githubusercontent.com on
# the main branch) to resolve short plugin names to GitHub repos. Adding
# a third-party plugin is a single PR against this file; no vitictl
# release is required for the plugin to become installable.
#
# Per-entry fields:
#   name:         short name used on the command line (e.g. "gui" -> viti-gui)
#   repo:         <owner>/<repo> hosting the plugin's GitHub releases
#   description:  one-line summary shown by `viti plugin list --available`
#
# Optional overrides (defaults cover the canonical "viti-<name> in its own
# repo" layout):
#   archiveAsset:        asset filename template; default
#                        "viti-{name}-{version}-{os}-{arch}.tar.gz"
#   archiveInnerPath:    path to the binary inside the archive; default
#                        "viti-{name}-{version}-{os}-{arch}/viti-{name}"
#   checksumsAsset:      SHA256SUMS filename template; default
#                        "viti-{name}-{version}-SHA256SUMS"
#   cosignIdentityRegex: OIDC identity regex for cosign verify-blob;
#                        default "^https://github.com/{repo}/.github/workflows/release.yml@refs/tags/"
#
# Template placeholders: {name} {repo} {version} {os} {arch}

plugins:
  - name: gui
    repo: vitistack/vitictl
    description: Terminal UI for viti
    # viti-gui is built in the same release workflow as viti itself and
    # shares the combined checksums file.
    checksumsAsset: "viti-{version}-SHA256SUMS"
